    .page-header {

    @media (min-width: 992px) {

      }

    /* Minimalist Contact Info Row */

      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: flex-start;
      margin-bottom: 2rem;
    }
    
    .social-icon-box {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    
    .info-icon {
      width: 45px;
      height: 45px;
      background: rgba(255, 107, 53, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF6B35;
      font-size: 1.4rem;
      transition: var(--transition);
    }
    
    .moving-border-container:hover .info-icon {
      background: #FF6B35;
      color: #0b0f19;
      transform: scale(1.1);
    }
    
    /* Vertical Form Styles */
    .form-group {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .form-group label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    
    .form-control {
      width: 100%;
      padding: 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-control:focus {
      outline: none;
      border-color: #FF6B35;
      background: rgba(255, 107, 53, 0.05);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
    }
    
    .btn-primary {
      background: #FF6B35;
      border: none;
      color: #fff;
      padding: 1.2rem;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-primary:hover {
      background: #ff8559;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
    }
    
    .map-container {
      width: 100% !important;
      height: 400px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      background-color: var(--card-bg);
    }
    
    @media (max-width: 992px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
      .contact-form {
